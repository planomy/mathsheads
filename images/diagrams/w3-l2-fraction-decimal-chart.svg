<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" role="img" aria-label="Fraction and decimal equivalents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2440"/>
      <stop offset="100%" stop-color="#1e1830"/>
    </linearGradient>
  </defs>
  <rect width="820" height="200" rx="12" fill="url(#bg)"/>
  <text x="410" y="34" text-anchor="middle" fill="#f0c040" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Fractions ” decimals</text>
  <g font-family="system-ui, sans-serif" font-size="16" fill="#e8e0f0">
    <text x="120" y="78"><tspan fill="#f0c040" font-weight="700">½</tspan> = 0.5</text>
    <text x="120" y="108"><tspan fill="#f0c040" font-weight="700">¼</tspan> = 0.25</text>
    <text x="120" y="138"><tspan fill="#f0c040" font-weight="700">V</tspan> = 0.4</text>
    <text x="120" y="168"><tspan fill="#f0c040" font-weight="700">¾</tspan> = 0.75</text>
    <text x="430" y="78"><tspan fill="#f0c040" font-weight="700">S</tspan> H 0.33</text>
    <text x="430" y="108"><tspan fill="#f0c040" font-weight="700">U</tspan> = 0.2</text>
    <text x="430" y="138"><tspan fill="#f0c040" font-weight="700">\</tspan> = 0.375</text>
    <text x="430" y="168"><tspan fill="#f0c040" font-weight="700">R</tspan> = 0.1</text>
  </g>
  <line x1="60" y1="52" x2="760" y2="52" stroke="#524878" stroke-width="1"/>
</svg>
