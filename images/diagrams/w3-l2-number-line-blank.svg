<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 160" role="img" aria-label="Number line from 0 to 1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2440"/>
      <stop offset="100%" stop-color="#1e1830"/>
    </linearGradient>
  </defs>
  <rect width="820" height="160" rx="12" fill="url(#bg)"/>
  <text x="410" y="36" text-anchor="middle" fill="#f0c040" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Number line · 0 to 1</text>
  <!-- main line -->
  <line x1="80" y1="88" x2="740" y2="88" stroke="#e8e0f0" stroke-width="4" stroke-linecap="round"/>
  <polygon points="740,88 728,82 728,94" fill="#e8e0f0"/>
  <!-- tick marks every 0.1, labels only 0 and 1 -->
  <g stroke="#9a92b0" stroke-width="2">
    <line x1="80" y1="76" x2="80" y2="100"/><line x1="146" y1="80" x2="146" y2="96"/>
    <line x1="212" y1="80" x2="212" y2="96"/><line x1="278" y1="80" x2="278" y2="96"/>
    <line x1="344" y1="80" x2="344" y2="96"/><line x1="410" y1="76" x2="410" y2="100"/>
    <line x1="476" y1="80" x2="476" y2="96"/><line x1="542" y1="80" x2="542" y2="96"/>
    <line x1="608" y1="80" x2="608" y2="96"/><line x1="674" y1="80" x2="674" y2="96"/>
    <line x1="740" y1="76" x2="740" y2="100"/>
  </g>
  <text x="80" y="128" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">0</text>
  <text x="740" y="128" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="800">1</text>
  <text x="410" y="148" text-anchor="middle" fill="#b8b0c8" font-family="system-ui, sans-serif" font-size="13">Where would you plot ˝, 0.45, V and 0.6?</text>
</svg>
