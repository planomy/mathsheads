<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Heads · Teacher · Year 5 Term 3</title>
<style>
  :root{
    --bg0:#262038; --bg1:#302a44; --bg2:#3a3450;
    --ink:#fcfaf8; --ink-dim:#ddd6ec; --ink-faint:#a89cb8;
    --panel:#443c5c; --panel2:#504868; --line:#6a6284;
    --chip-bg:#38324c;
    --cream:#fff8ed; --cream-ink:#2a2018;
    --gold:#e8b838; --gold2:#ffe8a0;
    --accent:#e8a838;
    --t1:#7ed99a; --t2:#f0c850; --t3:#f09888;
    --notice-bg:#faf0e6; --notice-ink:#3d2818; --notice-border:#e8a838;
    --radius:18px;
    --font:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--bg0);overflow:hidden;}
  #app{width:100vw;height:100vh;display:flex;flex-direction:column;}
  #stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 14px 4px;min-height:0;}
  .slide{
    position:relative;width:min(1180px,100%);aspect-ratio:16/10;max-height:100%;
    background:radial-gradient(1100px 480px at 75% -8%, rgba(240,192,64,.14), transparent 55%), linear-gradient(155deg,var(--bg1),#3e3858 55%,var(--bg2));
    border:1px solid rgba(255,255,255,.08);border-radius:26px;box-shadow:0 24px 60px rgba(12,8,24,.38);
    padding:22px 34px 42px;overflow:hidden;display:flex;flex-direction:column;
  }
  .slide.map-slide{overflow:auto;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;background:rgba(240,192,64,.16);color:#ffe8b0;border:1px solid rgba(240,192,64,.35);
    font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:11px;padding:6px 12px;border-radius:999px;margin-bottom:8px;}
  h1.title{font-size:clamp(24px,3.2vw,40px);line-height:1.05;margin:6px 0 10px;}
  .sub{color:var(--ink-dim);font-size:clamp(14px,1.4vw,17px);line-height:1.4;margin-bottom:10px;}
  .timing{display:inline-flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .timing span{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--ink-dim);}
  .body-scroll{flex:1;min-height:0;overflow:auto;}
  .card{border-radius:var(--radius);padding:16px 18px;}
  .card.cream{background:var(--cream);color:var(--cream-ink);box-shadow:0 6px 20px rgba(20,12,8,.12);}
  .card.dark{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);}
  .card.hook-card{background:linear-gradient(135deg,#524878,#403860);border:2px solid rgba(240,192,64,.5);}
  .card h3{font-size:clamp(16px,1.8vw,20px);margin-bottom:8px;}
  .card.cream p,.card.cream li{font-size:clamp(14px,1.35vw,17px);line-height:1.45;}
  .card.cream ul,.card.cream ol{margin:6px 0 6px 18px;}
  .notice{margin-top:10px;background:var(--notice-bg);border-left:5px solid var(--notice-border);color:var(--notice-ink);padding:9px 12px;border-radius:10px;font-size:14px;}
  .hook-q{font-size:clamp(20px,2.6vw,30px);font-weight:800;line-height:1.25;color:#fff0c8;margin:8px 0;}
  .diag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;flex:1;min-height:0;}
  .diag-cell{border-radius:14px;padding:14px;border:2px solid var(--line);display:flex;flex-direction:column;min-height:0;}
  .diag-cell.t1{border-color:rgba(126,217,154,.6);background:rgba(126,217,154,.12);}
  .diag-cell.t2{border-color:rgba(240,200,80,.6);background:rgba(240,200,80,.12);}
  .diag-cell.t3{border-color:rgba(240,152,136,.6);background:rgba(240,152,136,.12);}
  .diag-lbl{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .diag-lbl.t1{color:var(--t1)} .diag-lbl.t2{color:var(--gold2)} .diag-lbl.t3{color:var(--t3)}
  .diag-prompt{font-size:clamp(13px,1.25vw,16px);font-weight:700;line-height:1.3;}
  .diag-list{list-style:none;margin:0;padding:0;flex:1;min-height:0;overflow:auto;}
  .diag-list li{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;font-size:clamp(12px,1.15vw,14px);line-height:1.35;color:var(--ink);}
  .diag-list .n{flex:none;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.12);font-size:11px;font-weight:900;display:grid;place-items:center;color:var(--ink-dim);}
  .diag-cell.t1 .diag-list .n{color:var(--t1);border:1px solid rgba(126,217,154,.4)}
  .diag-cell.t2 .diag-list .n{color:var(--gold2);border:1px solid rgba(240,200,80,.4)}
  .diag-cell.t3 .diag-list .n{color:var(--t3);border:1px solid rgba(240,152,136,.4)}
  .diag-ans{font-size:12px;color:var(--ink-faint);margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
  .practice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
  .tier-col{border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);min-height:0;}
  .tier-col.t1{border-color:rgba(126,217,154,.45)} .tier-col.t2{border-color:rgba(240,200,80,.45)} .tier-col.t3{border-color:rgba(240,152,136,.45)}
  .tier-col h4{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
  .tier-col.t1 h4{color:var(--t1)} .tier-col.t2 h4{color:var(--gold2)} .tier-col.t3 h4{color:var(--t3)}
  .tier-col ol{margin:0 0 0 16px;font-size:clamp(12px,1.2vw,14px);line-height:1.35;color:var(--ink-dim);}
  .tier-col li{margin-bottom:5px;}
  .word-section{border-radius:14px;padding:14px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);}
  .word-section h4{color:var(--gold2);font-size:13px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
  .word-list{display:grid;grid-template-columns:1fr;gap:8px;}
  .word-item{display:flex;gap:10px;font-size:clamp(13px,1.25vw,15px);line-height:1.35;}
  .word-item .n{flex:none;width:22px;height:22px;border-radius:50%;background:var(--gold);color:#2a1808;font-weight:900;font-size:12px;display:grid;place-items:center;}
  .steps-list{counter-reset:step;list-style:none;}
  .steps-list li{counter-increment:step;display:flex;gap:12px;margin-bottom:10px;font-size:clamp(15px,1.5vw,18px);line-height:1.4;}
  .steps-list li::before{content:counter(step);flex:none;width:28px;height:28px;border-radius:50%;background:var(--gold);color:#2a1808;font-weight:900;display:grid;place-items:center;font-size:14px;}
  /* Kid-facing slides (diagnostic, solution, concept, practice) — +4px text */
  .slide.kid-slide h1.title{font-size:clamp(28px,3.4vw,44px);}
  .slide.kid-slide .diag-list li{font-size:clamp(16px,1.35vw,18px);}
  .slide.kid-slide .diag-list .n{width:24px;height:24px;font-size:15px;}
  .slide.kid-slide .steps-list li{font-size:clamp(19px,1.65vw,22px);}
  .slide.kid-slide .steps-list li::before{width:32px;height:32px;font-size:18px;}
  .slide.kid-slide .card.cream p,.slide.kid-slide .card.cream li{font-size:clamp(18px,1.55vw,21px);}
  .slide.kid-slide .card.cream h3{font-size:clamp(20px,2vw,24px);}
  .slide.kid-slide .card.dark p{font-size:20px;}
  .slide.kid-slide .notice{font-size:18px;}
  .slide.kid-slide .tier-col ol{font-size:clamp(16px,1.35vw,18px);}
  .slide.kid-slide .word-item{font-size:clamp(17px,1.4vw,19px);}
  .slide.kid-slide .word-item .n{width:26px;height:26px;font-size:16px;}
  /* ===== Gradual Release phases ===== */
  .topline{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .topline .eyebrow{margin-bottom:0;}
  .mode-chip{margin-left:auto;align-self:flex-start;border-radius:999px;padding:6px 13px;font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.14);white-space:nowrap;}
  .mode-chip.mode-talk{background:rgba(240,192,64,.18);color:var(--gold2);border-color:rgba(240,192,64,.4);}
  .mode-chip.mode-teams{background:rgba(150,130,240,.2);color:#cfc4ff;border-color:rgba(150,130,240,.4);}
  .mode-chip.mode-watch{background:rgba(120,180,240,.2);color:#bfe0ff;border-color:rgba(120,180,240,.4);}
  .mode-chip.mode-notebook{background:rgba(126,217,154,.18);color:#bff2cf;border-color:rgba(126,217,154,.4);}
  .retrieval-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex:1;min-height:0;}
  .retrieval-card{border-radius:16px;padding:16px 18px;background:rgba(150,130,240,.12);border:2px solid rgba(150,130,240,.35);display:flex;flex-direction:column;gap:10px;min-height:0;}
  .retrieval-card .rn{width:30px;height:30px;border-radius:50%;background:rgba(150,130,240,.3);color:#e6e0ff;font-weight:900;display:grid;place-items:center;font-size:15px;}
  .retrieval-card .rq{font-size:clamp(16px,1.6vw,21px);font-weight:700;line-height:1.3;}
  .intention-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;flex:1;min-height:0;}
  .intention-grid .card{overflow:auto;min-height:0;}
  .success-list{list-style:none;margin:8px 0 0;padding:0;}
  .success-list li{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:clamp(15px,1.5vw,19px);line-height:1.35;}
  .success-list li::before{content:'✓';flex:none;width:26px;height:26px;border-radius:50%;background:rgba(126,217,154,.25);color:var(--t1);font-weight:900;display:grid;place-items:center;font-size:14px;}
  .vocab-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .vocab-chips span{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:700;color:var(--ink-dim);}
  .whiteboard{flex:1;min-height:0;border-radius:18px;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 38px,rgba(255,255,255,.07) 39px);border:2px dashed rgba(255,255,255,.22);padding:18px 22px;overflow:auto;}
  .whiteboard .wb-prompt{font-size:clamp(16px,1.6vw,21px);font-weight:800;color:var(--gold2);margin-bottom:12px;}
  .wedo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex:1;min-height:0;}
  .wedo-card{border-radius:16px;padding:16px 18px;background:rgba(240,192,64,.1);border:2px solid rgba(240,192,64,.32);display:flex;flex-direction:column;gap:10px;min-height:0;}
  .wedo-card .wn{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#2a1808;font-weight:900;display:grid;place-items:center;font-size:15px;}
  .wedo-card .wq{font-size:clamp(16px,1.6vw,21px);font-weight:700;line-height:1.3;}
  .practice-notebook{border-radius:16px;padding:16px 20px;background:rgba(126,217,154,.08);border:1px solid rgba(126,217,154,.28);min-height:0;}
  .practice-notebook h4{color:#bff2cf;font-size:13px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
  .practice-notebook ol{margin:4px 0 0 20px;font-size:clamp(16px,1.5vw,20px);line-height:1.5;color:var(--ink-dim);}
  .practice-notebook ol li{margin-bottom:6px;}
  .soaker{margin-top:12px;padding:12px 16px;border-radius:14px;background:rgba(240,192,64,.14);border:1px solid rgba(240,192,64,.35);font-size:clamp(15px,1.4vw,18px);font-weight:700;color:var(--gold2);}
  .soaker b{background:var(--gold);color:#2a1808;padding:3px 10px;border-radius:999px;margin-right:10px;font-size:12px;letter-spacing:.08em;}
  .word-mini{margin-top:12px;}
  .word-mini h4{color:var(--ink-faint);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
  .word-mini .word-item{margin-bottom:8px;}
  .exit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;flex:1;min-height:0;}
  .exit-card{border-radius:16px;padding:20px 22px;background:rgba(126,217,154,.1);border:2px solid rgba(126,217,154,.35);display:flex;flex-direction:column;gap:12px;min-height:0;}
  .exit-card .en{width:32px;height:32px;border-radius:50%;background:rgba(126,217,154,.3);color:var(--t1);font-weight:900;display:grid;place-items:center;font-size:16px;}
  .exit-card .eq{font-size:clamp(18px,1.8vw,24px);font-weight:700;line-height:1.3;}
  /* Explicit teaching — two portrait annotate boards */
  .teach-panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0;}
  .teach-board{display:flex;flex-direction:column;min-height:0;border-radius:18px;background:#fff;color:#1e1a24;box-shadow:0 10px 28px rgba(12,8,24,.22);overflow:hidden;border:1px solid rgba(255,255,255,.2);}
  .teach-board .tb-head{flex:none;padding:14px 16px 12px;border-bottom:1px solid rgba(30,26,36,.08);}
  .teach-board .tb-kicker{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#8a7a5a;margin-bottom:6px;}
  .teach-board .tb-lead{font-size:clamp(16px,1.55vw,20px);font-weight:700;line-height:1.35;color:#1e1a24;}
  .teach-board .tb-lead p{margin:0 0 8px;}
  .teach-board .tb-lead p:last-child{margin-bottom:0;}
  .teach-board .tb-copy{font-size:clamp(15px,1.45vw,18px);font-weight:650;line-height:1.4;color:#2a2018;}
  .teach-board .tb-copy p{margin:0 0 6px;}
  .teach-board .tb-copy p:last-child{margin-bottom:0;}
  .teach-board .tb-tip{margin-top:8px;padding:8px 10px;border-radius:10px;background:#fff4d6;border-left:3px solid #e8a838;font-size:clamp(13px,1.2vw,15px);font-weight:700;line-height:1.35;color:#3d2818;}
  .teach-board .tb-prompt{margin-top:10px;font-size:clamp(18px,1.8vw,24px);font-weight:800;line-height:1.3;color:#1e1a24;}
  .teach-board .tb-space{flex:1;min-height:0;position:relative;background:
    repeating-linear-gradient(transparent,transparent 31px,rgba(30,26,36,.07) 32px);
    background-position:0 8px;}
  .teach-board .tb-space::after{content:'Annotate here';position:absolute;left:16px;bottom:12px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(30,26,36,.28);}
  /* Annotate + we do — reuse white work boards */
  .annotate-panel{flex:1;min-height:0;display:flex;}
  .annotate-panel .teach-board{flex:1;}
  .wedo-panels{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;min-height:0;}
  .wedo-panels .teach-board .tb-head .board-num{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#2a1808;font-weight:900;display:grid;place-items:center;font-size:15px;margin-bottom:8px;}
  /* answer reveal drawer */
  .answer-drawer{position:absolute;left:24px;right:24px;bottom:18px;background:#17364d;color:#fff;border-radius:18px;padding:16px 20px;box-shadow:0 18px 40px rgba(0,0,0,.4);transform:translateY(185%);transition:transform .24s ease;z-index:9;max-height:40%;overflow:auto;border:1px solid rgba(255,255,255,.12);}
  .slide.answer-open .answer-drawer{transform:translateY(0);}
  .answer-drawer .answer-kicker{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9ce7df;font-weight:900;margin-bottom:6px;}
  .answer-drawer .answer-content{font-size:clamp(16px,1.5vw,22px);font-weight:700;line-height:1.35;}
  .btn.reveal{background:linear-gradient(135deg,#ffe08a,#e8b838);color:#4c3b00;border:none;font-weight:900;}
  .btn.reveal[hidden]{display:none;}
  .screenlbl{position:absolute;left:34px;bottom:16px;color:var(--ink-faint);font-size:11px;letter-spacing:.12em;text-transform:uppercase;pointer-events:none;}
  .corner{position:absolute;right:34px;bottom:16px;color:var(--ink-faint);font-size:11px;pointer-events:none;}
  .corner kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:2px 6px;pointer-events:none;}
  /* Title slide hero + hook slide image */
  .title-layout,.hook-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);gap:16px;flex:1;min-height:0;margin-top:4px;}
  .hook-layout{align-items:stretch;}
  .hook-layout .hook-card{margin-top:0!important;min-height:0;}
  .title-main{display:flex;flex-direction:column;min-height:0;min-width:0;}
  .title-main .card.cream{flex:1;min-height:0;overflow:auto;}
  .hero-frame{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);min-height:min(42vh,320px);}
  .hero-frame.hook-img{min-height:min(36vh,280px);}
  .hero-frame.hook-img img{min-height:min(36vh,280px);}
  .hero-frame img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;min-height:min(42vh,320px);}
  .hero-frame.diagram img,
  .hero-frame img.svg-diagram{width:100%;height:min(42vh,320px);object-fit:contain;background:var(--bg0);display:block;}
  .hero-frame.hook-img.diagram img,
  .hero-frame.hook-img img.svg-diagram{height:min(36vh,280px);}
  .hero-frame .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(38,32,56,.85));color:var(--gold2);font-size:12px;font-weight:700;padding:22px 12px 10px;letter-spacing:.04em;}
  .hero-missing{display:grid;place-items:center;min-height:min(42vh,320px);padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;line-height:1.45;}
  .hero-missing code{font-size:11px;color:var(--gold2);word-break:break-all;}
  .hero-frame.missing .cap{display:none;}
  .hero-frame.missing::after{content:'Image not found — add file to images/';display:grid;place-items:center;position:absolute;inset:0;padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;line-height:1.45;}
  /* Term map */
  .week-block{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .week-head{padding:10px 14px;background:rgba(255,255,255,.07);font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);}
  .lesson-pick{display:grid;grid-template-columns:40px 1fr auto;gap:10px;align-items:center;padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);cursor:pointer;}
  .lesson-pick:hover{background:rgba(240,192,64,.1);}
  .lesson-pick.off{opacity:.45;cursor:default;}
  .lesson-pick.off:hover{background:transparent;}
  .badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;text-transform:uppercase;}
  .badge.ok{background:rgba(110,207,138,.2);color:var(--t1);}
  .badge.wait{background:rgba(255,255,255,.06);color:var(--ink-faint);}
  .badge.assess{background:rgba(240,192,64,.18);color:var(--gold2);}
  .btn.assess{background:linear-gradient(135deg,var(--gold),var(--accent));color:#2a1808;border:none;font-weight:900;}
  .btn.assess.open{border:2px solid var(--gold2);box-shadow:0 0 0 1px rgba(240,192,64,.35);}
  /* Assessment slides */
  .assess-meta{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 12px;}
  .assess-meta span{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--ink-dim);}
  .assess-list{margin:0 0 0 18px;line-height:1.5;font-size:clamp(14px,1.35vw,16px);}
  .assess-list li{margin-bottom:6px;}
  .assess-open-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:12px 0;}
  .assess-open-row a.btn{text-decoration:none;display:inline-block;}
  .assess-preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px;}
  .assess-preview img{width:100%;height:auto;border-radius:12px;border:1px solid var(--line);background:#fff;}
  .assess-doc-wrap{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:8px;}
  .assess-doc-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;flex-shrink:0;}
  .assess-doc-toolbar .hint{font-size:12px;color:var(--ink-faint);}

  /* Assessment overlay */

  #tnotes.open{transform:none;}
  #tnotes header{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  #tnotes header b{color:var(--gold2);}
  #tnotes .body{padding:18px;overflow:auto;flex:1;font-size:14.5px;line-height:1.55;color:var(--ink-dim);}
  #tnotes .body h4{color:var(--gold2);margin:12px 0 6px;font-size:15px;}

  /* Present mode */

<body>
<div id="app">
  <div id="stageWrap"><div class="slide" id="slide"></div></div>
  <nav id="nav">
    <div class="nav-inner">
      <button class="btn" id="mapBtn" type="button">🗺 Term map</button>
      <select id="jump" aria-label="Jump to slide"></select>
      <span id="counter">—</span>
      <div class="nav-pager">
        <button class="btn" id="prev" type="button">← Prev</button>
        <button class="btn primary" id="next" type="button">Next →</button>
      </div>
      <button class="btn reveal" id="revealBtn" type="button" title="R" hidden>💡 Reveal</button>
      <button class="btn" id="notesBtn" type="button">Teacher notes</button>
      <button class="btn assess" id="assessBtn" type="button" style="display:none" title="A">📋 Task</button>
      <button class="btn" id="presentBtn" type="button" title="F">⛶ Present</button>
    </div>
  </nav>
</div>
<aside id="tnotes">
  <header><b>Teacher notes</b><button class="btn" id="notesClose" type="button">✕</button></header>
  <div class="body" id="tnotesBody"></div>
</aside>
<div id="assessOverlay" role="dialog" aria-modal="true" aria-label="Assessment task">
  <div class="assess-panel">
    <header><b id="assessPanelTitle">Assessment task</b><button class="btn" id="assessClose" type="button">✕</button></header>
    <div class="body" id="assessPanelBody"></div>
  </div>
</div>
<script src="lessons.js?v=7"></script>
<script src="assessments.js?v=5"></script>
<script>
/* Gradual Release progression (~50 min teaching block) */
const PHASES = ['title','hook','retrieval','intention','teach','annotate','wedo','practice','exit'];
const PHASE_LABELS = { title:'Title', hook:'Hook', retrieval:'Retrieval', intention:'Learning intention', teach:'Explicit teaching', annotate:'Live annotation', wedo:'We do', practice:'Independent practice', exit:'Exit ticket' };
const MODE_BY_PHASE = { title:'', hook:'TALK', retrieval:'TEAMS', intention:'WATCH', teach:'WATCH', annotate:'NOTEBOOK', wedo:'TALK', practice:'NOTEBOOK', exit:'NOTEBOOK' };
const MODE_CLASS = { TALK:'mode-talk', TEAMS:'mode-teams', WATCH:'mode-watch', NOTEBOOK:'mode-notebook' };
const PHASE_TIMING = { hook:3, retrieval:4, intention:2, teach:8, annotate:8, wedo:8, practice:12, exit:5 };
const ASSESS_PHASES = ['title','brief','task'];
const ASSESS_PHASE_LABELS = { title:'Overview', brief:'This session', task:'Official task' };

let mode = 'map'; // map | lesson
let lessonId = null;
let slideIdx = 0;

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getLesson(id){ return LESSONS.find(l=>l.id===id); }
function lessonReady(l){ return l && (l.ready || l.type==='assessment'); }
function isAssessmentLesson(l){ return l && l.type==='assessment'; }
function currentPhases(l){ return isAssessmentLesson(l) ? ASSESS_PHASES : PHASES; }
function currentPhaseLabels(l){ return isAssessmentLesson(l) ? ASSESS_PHASE_LABELS : PHASE_LABELS; }
function getAssessCtx(lessonId){
  const l = getLesson(lessonId);
  if(!l?.assessmentId) return getAssessSession(lessonId);
  const assess = getAssessment(l.assessmentId);
  const session = assess?.sessions?.[lessonId];
  return assess && session ? { assess, session } : null;
}

function ansStr(q){
  const a = q?.answer ?? q;
  return Array.isArray(a) ? a[0] : a;
}
function stripTags(s){
  return String(s ?? '').replace(/<[^>]+>/g, '');
}
function qaList(items){
  const list = (items || []).filter(Boolean);
  if(!list.length) return '<p><i>No items.</i></p>';
  return `<ol class="qa">${list.map(q => {
    const prompt = q?.prompt != null ? stripTags(q.prompt) : '';
    const answer = stripTags(ansStr(q));
    if(prompt){
      return `<li><span class="nq">${esc(prompt)}</span><span class="na">${esc(answer)}</span></li>`;
    }
    return `<li><span class="na">${esc(answer)}</span></li>`;
  }).join('')}</ol>`;
}
function answerKeyHtml(l){
  if(!l || isAssessmentLesson(l)) return '';
  const f = buildTeachFlow(l);
  let inner = '';
  if(f.retrieval?.length){
    inner += `<h4>Retrieval</h4>${qaList(f.retrieval)}`;
  }
  if(f.annotate?.answer){
    inner += `<h4>Live annotation (hook) answer</h4><div class="hook-ans">${esc(stripTags(f.annotate.answer))}</div>`;
  }
  if(f.wedo?.length){
    inner += `<h4>We do</h4>${qaList(f.wedo)}`;
  }
  if(f.exit?.length){
    inner += `<h4>Exit ticket</h4>${qaList(f.exit)}`;
  }
  if(f.practice?.soaker){
    inner += `<h4>Soaker</h4><p>${esc(stripTags(f.practice.soaker))}</p>`;
  }
  // Full tier banks + diagnostic kept here for the teacher (not shown on the calm practice slide)
  const tiers = diagTiers(l);
  if(tiers.some(t => t.length)){
    inner += `<h4>Diagnostic bank (retrieval source)</h4>`;
    tiers.forEach((items, i) => {
      if(!items.length) return;
      inner += `<p><b>Tier ${i + 1}</b></p>${qaList(items)}`;
    });
  }
  if(l.practice){
    [1, 2, 3].forEach(t => {
      const items = l.practice[t] || [];
      if(!items.length) return;
      inner += `<h4>Practice · Tier ${t} (full bank)</h4>${qaList(items)}`;
    });
  }
  if(l.wordProblems?.length){
    inner += `<h4>Word problems</h4>${qaList(l.wordProblems)}`;
  }
  if((l.teach?.example) || l.concept?.example){
    inner += `<h4>Worked example</h4><p>${esc(stripTags(l.teach?.example || l.concept.example))}</p>`;
  }
  if(!inner) return '<div class="answer-key"><h3>Answer key</h3><p><i>No answers stored for this lesson yet.</i></p></div>';
  return `<div class="answer-key"><h3>Answer key</h3>${inner}</div>`;
}

function assessAnswerKeyHtml(session){
  const items = session?.items || [];
  const answers = session?.answers || [];
  if(!items.length && !answers.length) return '';
  const rows = items.map((prompt, i) => {
    const answer = answers[i];
    const q = esc(stripTags(prompt));
    if(answer == null || answer === ''){
      return `<li><span class="nq">${q}</span><span class="na">—</span></li>`;
    }
    return `<li><span class="nq">${q}</span><span class="na">${esc(stripTags(answer))}</span></li>`;
  });
  answers.slice(items.length).forEach((answer, i) => {
    rows.push(`<li><span class="nq">Q${items.length + i + 1}</span><span class="na">${esc(stripTags(answer))}</span></li>`);
  });
  if(!rows.length) return '';
  return `<div class="answer-key"><h3>Answer key</h3><ol class="qa">${rows.join('')}</ol></div>`;
}

function diagTiers(l){
  const d = l.diagnostic;
  if(!d) return [[],[],[]];
  if(Array.isArray(d)) return [1,2,3].map(i => d[i-1] ? [d[i-1]] : []);
  return [1,2,3].map(t => d[t] || []);
}

/* ---------- Gradual Release adapter ----------
   Normalises legacy lesson data (diagnostic / hook / hookSolution / concept /
   practice / wordProblems) into the 9-phase teach flow, preferring explicit
   new-style fields (retrieval / intention / teach / annotate / wedo /
   exit|exitTicket / soaker) when the author has supplied them. */
function normItems(items){
  return (items || []).filter(Boolean).map(q => ({ prompt: q.prompt, answer: ansStr(q) }));
}
function joinAnswers(items){
  return normItems(items).map(q => stripTags(q.answer)).filter(Boolean).join('   ·   ');
}
function exampleSeed(ex){
  if(!ex) return '';
  return String(ex).split(/\s*(?:→|->|⇒)\s*/)[0].trim();
}
function noteHtml(s){
  if(!s) return '';
  return String(s).includes('<') ? String(s) : esc(s);
}
function leadBlock(s){
  if(!s) return '';
  const html = noteHtml(s);
  return /<p[\s>]/i.test(html) ? html : `<p>${html}</p>`;
}
/* Two portrait boards: 1–2 lead sentences on top, blank annotate space below. */
function splitTeachPanels(t){
  const body = (t.body || []).filter(Boolean);
  const tipHtml = t.notice ? noteHtml(t.notice) : '';
  const seed = exampleSeed(t.example);
  const heading = stripTags(t.heading || 'today’s skill');
  const authored = t.panelLeads || {};

  // Left: up to two well-worded method sentences (from body, or authored override)
  let leftLead;
  if(authored.left){
    leftLead = leadBlock(authored.left);
  } else if(body.length){
    leftLead = body.slice(0, 2).map(p => `<p>${p}</p>`).join('');
  } else {
    leftLead = `<p>Here’s how <b>${esc(heading)}</b> works. Annotate the steps in the space below as you explain.</p>`;
  }

  // Right: two short modelling sentences + example seed
  let rightLead;
  if(authored.right){
    rightLead = leadBlock(authored.right);
  } else if(seed){
    rightLead = `<p>Watch one clear example of <b>${esc(heading)}</b>.</p><p>Think aloud — annotate each step below, then decide and check.</p>`;
  } else {
    rightLead = `<p>Model one clear example of <b>${esc(heading)}</b> together.</p><p>Think aloud as you annotate each step in the space below.</p>`;
  }

  return {
    left: { kicker: 'The idea', lead: leftLead, tip: tipHtml },
    right: {
      kicker: 'Model it',
      lead: rightLead,
      prompt: seed ? esc(stripTags(seed)) : '',
      tip: ''
    }
  };
}
function annotateBoardLead(a){
  const prompt = a.prompt || 'Work this out with me on the board.';
  const first = a.steps?.[0];
  if(first){
    return `<p>${noteHtml(prompt)}</p><p>${first}</p>`;
  }
  return `<p>${noteHtml(prompt)}</p><p>Model each step in the space below — think aloud as you go.</p>`;
}
function wedoBoardLead(){
  return `<p>Try together — mini-whiteboards, partners, or choral response. Show your working in the space below.</p>`;
}
/* Rich phase notes when authored tips are thin one-liners. */
function authorPhaseNote(l, phase){
  const NOTE_FALLBACK = {
    title:['title'], hook:['hook'], retrieval:['retrieval','diagnostic'],
    intention:['intention'], teach:['teach','concept'], annotate:['annotate','solution'],
    wedo:['wedo'], practice:['practice'], exit:['exit','exitTicket']
  };
  const keys = NOTE_FALLBACK[phase] || [phase];
  for(const k of keys){ if(l.notes && l.notes[k]) return l.notes[k]; }
  return '';
}
function phaseTeachNotesHtml(l, phase){
  const f = buildTeachFlow(l);
  let auto = '';

  if(phase === 'hook'){
    const hk = f.hook || {};
    auto += l.focus ? `<p><b>Focus:</b> ${esc(l.focus)}</p>` : '';
    auto += `<p><b>Do:</b> Read the problem once. Give 30–60s think time, then turn-and-talk. Do <i>not</i> solve it yet — collect strategies and language.</p>`;
    if(hk.context) auto += `<p><b>Context:</b> ${noteHtml(hk.context)}</p>`;
  }
  else if(phase === 'retrieval'){
    auto += `<p><b>Purpose:</b> Wake up prior knowledge — fast, low-stakes recall before new learning.</p>`;
    auto += `<p><b>Do:</b> Mini-whiteboards or teams (~4 min). Circulate for misconceptions. Reveal with <kbd>R</kbd> only after most have attempted.</p>`;
    if(f.retrieval?.length){
      auto += `<p><b>Listen for:</b></p><ul>${f.retrieval.map(q =>
        `<li>${noteHtml(q.prompt)} <span style="color:var(--gold2)">→ ${esc(stripTags(q.answer))}</span></li>`
      ).join('')}</ul>`;
    }
  }
  else if(phase === 'intention'){
    const it = f.intention;
    auto += `<p><b>We are learning to:</b> ${noteHtml(it.learning)}</p>`;
    auto += `<p><b>Success looks like:</b></p><ul>${(it.success||[]).map(s=>`<li>${noteHtml(s)}</li>`).join('')}</ul>`;
    if(it.vocab?.length) auto += `<p><b>Vocabulary to hear/use:</b> ${it.vocab.map(v=>esc(v)).join(' · ')}</p>`;
    auto += `<p><b>Do:</b> Read WALT once. Ask one student to rephrase success criteria in their own words.</p>`;
  }
  else if(phase === 'teach'){
    const t = f.teach;
    auto += l.focus ? `<p><b>Focus:</b> ${esc(l.focus)}</p>` : '';
    auto += `<p><b>Teach through (I do):</b> Keep the left board as the “idea”. Annotate the blank space as you explain — don’t just read the bullets.</p>`;
    if(t.body?.length){
      auto += `<p><b>Talk track:</b></p><ol>${t.body.map(b=>`<li>${b}</li>`).join('')}</ol>`;
    }
    if(t.notice) auto += `<p><b>Watch out / notice:</b> ${noteHtml(t.notice)}</p>`;
    if(t.example){
      const seed = exampleSeed(t.example);
      auto += `<p><b>Model prompt on the board:</b> ${esc(stripTags(seed || t.example))}</p>`;
      auto += `<p><b>Full worked example (reveal with R):</b> ${esc(stripTags(t.example))}</p>`;
      auto += `<p><b>Say:</b> “Watch my thinking. I’ll line them up / break them apart, decide, then check.” Pause after each step for a choral repeat.</p>`;
    }
    auto += `<p><b>CFU:</b> Ask “How do you know?” Get at least two student explanations before moving on.</p>`;
  }
  else if(phase === 'annotate'){
    const a = f.annotate;
    auto += `<p><b>Purpose:</b> Live model of today’s strategy on the hook problem — students copy the structure into notebooks.</p>`;
    if(a.prompt) auto += `<p><b>Prompt:</b> ${noteHtml(a.prompt)}</p>`;
    if(a.steps?.length){
      auto += `<p><b>Step-by-step script:</b></p><ol>${a.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`;
    }
    if(a.answer) auto += `<p><b>Final answer:</b> ${esc(stripTags(a.answer))}</p>`;
    auto += `<p><b>Do:</b> Narrate decisions (“Why this step?”). Leave one deliberate pause for students to predict the next move.</p>`;
  }
  else if(phase === 'wedo'){
    auto += `<p><b>Purpose:</b> Guided practice — you still steer, students do more of the talking.</p>`;
    auto += `<p><b>Do:</b> One question at a time. Hands / mini-whiteboards. Cold-call explanations. Reveal with <kbd>R</kbd> after each or at the end.</p>`;
    if(f.wedo?.length){
      auto += `<p><b>Items + answers:</b></p><ul>${f.wedo.map(q =>
        `<li>${noteHtml(q.prompt)} <span style="color:var(--gold2)">→ ${esc(stripTags(q.answer))}</span></li>`
      ).join('')}</ul>`;
    }
  }
  else if(phase === 'practice'){
    const pr = f.practice;
    auto += `<p><b>Purpose:</b> Quiet independent practice of today’s strategy.</p>`;
    auto += `<p><b>Do:</b> Students work in notebooks showing every step. Circulate for the same misconception from retrieval/teach. Fast finishers → soaker, then stretch word problems.</p>`;
    if(pr?.primary?.length){
      auto += `<p><b>Primary set (Tier ${pr.tier}) answers:</b></p>${qaList(pr.primary)}`;
    }
    if(pr?.soaker) auto += `<p><b>Soaker:</b> ${esc(stripTags(pr.soaker))}</p>`;
  }
  else if(phase === 'exit'){
    auto += `<p><b>Purpose:</b> Quick check — did today’s teaching stick?</p>`;
    auto += `<p><b>Do:</b> Slip or last two lines in books (~5 min). Mark cold or scan for the lesson’s watch-out. Use results to regroup tomorrow.</p>`;
    if(f.exit?.length){
      auto += `<p><b>Exit items + answers:</b></p><ul>${f.exit.map(q =>
        `<li>${noteHtml(q.prompt)} <span style="color:var(--gold2)">→ ${esc(stripTags(q.answer))}</span></li>`
      ).join('')}</ul>`;
    }
  }
  else if(phase === 'title'){
    auto += l.focus ? `<p><b>Focus:</b> ${esc(l.focus)}</p>` : '';
    auto += `<p><b>Flow today:</b> Hook → Retrieval → Intention → Teach → Annotate → We do → Practice → Exit (~50 min).</p>`;
    auto += `<p><b>Materials:</b> mini-whiteboards, notebooks, and any manipulatives named in the hook.</p>`;
  }

  const author = authorPhaseNote(l, phase);
  let html = '';
  if(auto) html += `<div class="phase-notes"><h4>How to teach this slide</h4>${auto}</div>`;
  if(author) html += `<div class="phase-notes"><h4>Board tip</h4>${author}</div>`;
  if(phase === 'retrieval' && l.notes?.placement){
    html += `<h4>Placement guide</h4>${l.notes.placement}`;
  }
  return html;
}
function buildTeachFlow(l){
  const tiers = diagTiers(l);                 // [t1, t2, t3]
  const p = l.practice || {};

  // Retrieval — explicit, else first 3 of diagnostic tier 2 (fallback t1 → t3)
  let retrieval = l.retrieval && l.retrieval.length ? normItems(l.retrieval) : null;
  if(!retrieval){
    const src = tiers[1]?.length ? tiers[1] : (tiers[0]?.length ? tiers[0] : tiers[2]);
    retrieval = normItems((src || []).slice(0, 3));
  }

  // Learning intention
  const li = l.intention || {};
  const intention = {
    learning: li.learning || l.focus || l.concept?.heading || l.title,
    success: (li.success && li.success.length) ? li.success
      : [ l.focus || 'Use today’s strategy', 'Explain my thinking', 'Check with a partner' ],
    vocab: li.vocab || []
  };

  // Explicit teaching — new teach block, else legacy concept
  const teach = l.teach || l.concept || { heading: l.title, body: [], notice: '', example: '' };

  // Live annotation — explicit, else derive from hookSolution
  let annotate = l.annotate;
  if(!annotate){
    const s = l.hookSolution || {};
    annotate = {
      prompt: 'Work this out with me on the board.',
      steps: s.steps || [],
      answer: s.answer || '',
      hints: []
    };
  } else {
    annotate = { prompt: annotate.prompt || 'Work this out with me on the board.',
      steps: annotate.steps || [], answer: annotate.answer || '', hints: annotate.hints || [] };
  }

  // We do — explicit, else 3 items from practice tier 2 (fallback t1)
  let wedo = l.wedo && l.wedo.length ? normItems(l.wedo) : null;
  if(!wedo){
    const src = p[2]?.length ? p[2] : (p[1] || []);
    wedo = normItems(src.slice(0, 3));
  }

  // Independent practice — one calm primary tier (tier 2 default) + soaker + ≤2 word problems
  const primaryTier = p[2]?.length ? 2 : (p[1]?.length ? 1 : 3);
  const primary = normItems((p[primaryTier] || []).slice(0, 4));
  const soaker = l.soaker || l.wordProblems?.[0]?.prompt || '';
  const words = (l.wordProblems || []).slice(l.soaker ? 0 : 1, l.soaker ? 2 : 3);

  // Exit ticket — explicit, else 2 items from practice tier 1 (fallback t2)
  let exit = (l.exit || l.exitTicket);
  exit = (exit && exit.length) ? normItems(exit) : null;
  if(!exit){
    const src = p[1]?.length ? p[1] : (p[2] || []);
    exit = normItems(src.slice(0, 2));
  }

  const reveal = {
    retrieval: joinAnswers(retrieval),
    teach: teach.example ? stripTags(teach.example) : '',
    annotate: annotate.answer ? stripTags(annotate.answer) : '',
    wedo: joinAnswers(wedo),
    practice: joinAnswers(primary),
    exit: joinAnswers(exit),
    soaker: ''
  };

  return {
    hook: l.hook,
    retrieval,
    intention,
    teach,
    annotate,
    wedo,
    practice: { tier: primaryTier, primary, soaker, words },
    exit,
    reveal
  };
}

function toplineHtml(phase, extraEyebrow){
  const mode = MODE_BY_PHASE[phase];

  return `<div class="topline"><span class="eyebrow">${extraEyebrow || PHASE_LABELS[phase]}</span>${chip}</div>`;
}

function imageBlock(img, extraClass, fallbackSrc){
  if(!img?.src) return '';
  const src = img.src;
  const alt = esc(img.alt || '');
  const cap = img.caption ? `<div class="cap">${esc(img.caption)}</div>` : '';
  const isDiagram = img.diagram || /\.svg$/i.test(src);
  const diagram = isDiagram ? ' diagram' : '';
  const cls = extraClass ? ` ${extraClass}` : '';
  const fb = fallbackSrc ? esc(fallbackSrc) : '';
  const imgCls = isDiagram ? ' class="svg-diagram"' : '';
  return `<div class="hero-frame${diagram}${cls}" data-img="${esc(src)}">
    <img src="${esc(src)}" alt="${alt}"${imgCls} loading="eager" decoding="async"${fb ? ` data-fallback="${fb}"` : ''} onerror="if(this.dataset.fallback&&!this.dataset.tried){this.dataset.tried=1;this.src=this.dataset.fallback;return;}this.closest('.hero-frame').classList.add('missing');this.remove();">
    ${cap}
  </div>`;
}

function heroBlock(l){
  return imageBlock(l.hero);
}

function hookImageBlock(l){
  const h = l.hook;
  if(!h) return '';
  const img = h.image || {
    src: `images/hooks/${l.id}-hook.jpg`,
    alt: h.title || l.title,
    caption: h.title,
    diagram: l.hero?.diagram
  };
  return imageBlock(img, 'hook-img', l.hero?.src);
}

function openLesson(id, startSlide){
  const l = getLesson(id);
  if(!lessonReady(l)) return;
  closeAssessOverlay();
  mode = 'lesson';
  lessonId = id;
  slideIdx = startSlide ?? 0;
  if(isAssessmentLesson(l) && l.assessmentId){
    const a = getAssessment(l.assessmentId);
    if(a?.display !== 'pages') fetchAssessHtml(l.assessmentId).catch(()=>{});
  }
  renderSlide();
}

function readyLessons(){
  return LESSONS.filter(lessonReady);
}

function adjacentLesson(delta){
  const list = readyLessons();
  const i = list.findIndex(l => l.id === lessonId);
  if(i < 0) return null;
  return list[i + delta] || null;
}

function navPrev(){
  if(mode !== 'lesson') return;
  const l = getLesson(lessonId);
  if(slideIdx > 0) show(slideIdx - 1);
  else {
    const prev = adjacentLesson(-1);
    if(prev) openLesson(prev.id, currentPhases(prev).length - 1);
  }
}

function navNext(){
  if(mode !== 'lesson') return;
  const l = getLesson(lessonId);
  const phases = currentPhases(l);
  if(slideIdx < phases.length - 1) show(slideIdx + 1);
  else {
    const next = adjacentLesson(1);
    if(next) openLesson(next.id, 0);
  }
}

/* ---------- Lesson slides ---------- */
function goToAssessTask(){
  if(mode!=='lesson') return;
  const l = getLesson(lessonId);
  if(!isAssessmentLesson(l)) return;
  const phases = currentPhases(l);
  const taskIdx = phases.indexOf('task');
  if(taskIdx >= 0) show(taskIdx);
}

function toggleAssessTask(){
  if(mode!=='lesson') return;
  const l = getLesson(lessonId);
  if(!isAssessmentLesson(l)) return;
  const phases = currentPhases(l);
  const taskIdx = phases.indexOf('task');
  if(slideIdx !== taskIdx && taskIdx >= 0){ show(taskIdx); return; }
  if(document.getElementById('assessOverlay').classList.contains('open')) closeAssessOverlay();
  else openAssessOverlay();
}

function assessOpenLink(file){
  return `<a class="btn assess" href="${esc(file)}" target="_blank" rel="noopener">↗ Open Word file</a>`;
}

function mountAssessDoc(assessId, el, sessionLabel, lessonId){
  if(!el || !assessId) return;
  const assess = getAssessment(assessId);
  if(!assess) return;

  if(assess.display === 'pages' && assess.pages?.length){
    const pages = getAssessPages(assess, lessonId, false);
    el.className = 'assess-doc-content assess-pages';
    let html = '';
    if(sessionLabel){
      html += `<p class="assess-session-note">This session: ${esc(sessionLabel)}</p>`;
    }
    html += pages.map(p=>`
      <figure class="assess-page">
        <img src="${esc(p.src)}" alt="${esc(p.label)}" loading="eager" onerror="this.alt='Missing: ${esc(p.src)}';this.style.minHeight='120px';this.style.background='#f0e8f8';">
        <figcaption>${esc(p.label)}</figcaption>
      </figure>`).join('');
    el.innerHTML = html || '<p>No pages for this session.</p>';
    return;
  }

  el.className = 'assess-doc-content loading';
  el.textContent = 'Loading assessment…';
  fetchAssessHtml(assessId).then(html=>{
    el.className = 'assess-doc-content';
    el.innerHTML = html;
    if(sessionLabel){
      const note = document.createElement('p');
      note.className = 'assess-session-note';
      note.textContent = 'This session: ' + sessionLabel;
      el.insertBefore(note, el.firstChild);
    }
  }).catch(()=>{
    el.className = 'assess-doc-content loading';
    el.textContent = 'Could not load assessment — open the Word file instead.';
  });
}

      <h1 class="title">Your turn — quiet maths</h1>
      <p class="sub">Work in your notebook. Show every step. Fast finishers try the soaker.</p>
      <div class="body-scroll">
        <div class="practice-notebook">
          <h4>Notebook practice</h4>
          <ol>${pr.primary.map(q=>`<li>${q.prompt}</li>`).join('')}</ol>
        </div>
        ${pr.soaker?`<div class="soaker"><b>SOAKER</b>${pr.soaker}</div>`:''}
        ${pr.words?.length?`<div class="word-mini">
          <h4>🌍 Word problems (stretch)</h4>
          <div class="word-list">${pr.words.map((w,i)=>`<div class="word-item"><span class="n">${i+1}</span><span>${w.prompt}</span></div>`).join('')}</div>
        </div>`:''}
      </div>`;
  }
  else if(phase==='exit'){
    html = `${toplineHtml('exit','Check for understanding')}
      <h1 class="title">Exit ticket</h1>
      <p class="sub">Quick check before you go. On a slip or in your book — press <kbd>R</kbd> to reveal answers.</p>
      <div class="exit-grid">${f.exit.map((q,i)=>`
        <div class="exit-card"><span class="en">${i+1}</span><div class="eq">${q.prompt}</div></div>`).join('')}</div>`;
  }

  const revealText = f.reveal[phase] || '';
  if(revealText){
    html += `<div class="answer-drawer"><div class="answer-kicker">${esc(phaseLabels[phase])} · answer</div><div class="answer-content">${esc(revealText)}</div></div>`;
  }

  html += `<div class="screenlbl">Week ${l.week} · L${l.lesson} · ${phaseLabels[phase]}${min?` · ~${min}m`:''}</div>
    <div class="corner"><kbd>←</kbd><kbd>→</kbd> slides · <kbd>R</kbd> reveal · <kbd>T</kbd> notes · <kbd>F</kbd> present</div>`;
  el.innerHTML = html;
  const rb = document.getElementById('revealBtn');
  rb.hidden = !revealText;
  rb.classList.remove('primary');
  updateNav();
  fillNotes(l, phase);
}

function toggleReveal(){
  if(mode!=='lesson') return;
  const el = document.getElementById('slide');
  if(!el || !el.querySelector('.answer-drawer')) return;
  const open = el.classList.toggle('answer-open');
  document.getElementById('revealBtn').classList.toggle('primary', open);
}

function updateNav(){
  const counter = document.getElementById('counter');
  const jump = document.getElementById('jump');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const assessBtn = document.getElementById('assessBtn');
  if(mode==='map'){
    counter.textContent = 'Term map';
    jump.innerHTML = '<option value="">—</option>';
    jump.disabled = true;
    prev.disabled = true;
    next.disabled = true;
    assessBtn.style.display = 'none';
    return;
  }
  const l = getLesson(lessonId);
  const phases = currentPhases(l);
  const labels = currentPhaseLabels(l);
  const isAssess = isAssessmentLesson(l);
  assessBtn.style.display = isAssess ? '' : 'none';
  assessBtn.classList.toggle('open', document.getElementById('assessOverlay').classList.contains('open'));
  jump.disabled = false;
  const prevL = adjacentLesson(-1);
  const nextL = adjacentLesson(1);
  prev.disabled = slideIdx <= 0 && !prevL;
  next.disabled = slideIdx >= phases.length - 1 && !nextL;
  prev.textContent = (slideIdx <= 0 && prevL) ? '← Prev lesson' : '← Prev';
  next.textContent = (slideIdx >= phases.length - 1 && nextL) ? 'Next lesson →' : 'Next →';
  counter.textContent = `W${l.week} L${l.lesson} · ${slideIdx+1}/${phases.length} · ${labels[phases[slideIdx]]}`;
  jump.innerHTML = phases.map((p,i)=>`<option value="${i}"${i===slideIdx?' selected':''}>${i+1}. ${labels[p]}</option>`).join('');
  updatePresentScale();
}

function fillNotes(l, phase){
  const body = document.getElementById('tnotesBody');
  if(!l){ body.innerHTML = '<p>Select a lesson from the term map. Use <b>Present</b> when screen-sharing.</p><p>Assessment lessons (Weeks 3 &amp; 7) open the official <b>.docx</b> tasks.</p>'; return; }
  const labels = currentPhaseLabels(l);
  let html = `<p><b>${esc(l.title)}</b> · ${labels[phase]||phase}</p>`;

  if(isAssessmentLesson(l)){
    const ctx = getAssessCtx(l.id);
    const assess = ctx?.assess;
    const session = ctx?.session;
    html += assessAnswerKeyHtml(session);
    if(session?.notes) html += `<div class="phase-notes">${session.notes}</div>`;
    else html += '<p>Session notes — see assessments.js</p>';
    if(assess?.pages?.length){
      const guide = assess.pages.find(p=>p.teacherOnly);
      if(guide) html += `<h4>Marking guide</h4><img src="${esc(guide.src)}" alt="${esc(guide.label)}" style="width:100%;border-radius:10px;border:1px solid var(--line)">`;
    }
    if(phase==='task' && assess?.file){
      html += `<h4>Official file</h4><p><a href="${esc(assess.file)}">${esc(assess.file)}</a></p>`;
      if(assess.conditions?.length) html += `<h4>Conditions</h4><ul>${assess.conditions.map(c=>`<li>${c}</li>`).join('')}</ul>`;
    }
    body.innerHTML = html;
    return;
  }

  // Answers first so they're visible without scrolling past phase tips
  html += answerKeyHtml(l);
  html += phaseTeachNotesHtml(l, phase);
  body.innerHTML = html;
}

function show(i){
  if(mode!=='lesson') return;
  const l = getLesson(lessonId);
  const phases = currentPhases(l);
  slideIdx = Math.max(0, Math.min(phases.length-1, i));
  renderSlide();
}

function openAssessOverlay(){
  const l = getLesson(lessonId);
  const ctx = getAssessCtx(l?.id);
  if(!ctx) return;
  const { assess, session } = ctx;
  document.getElementById('assessPanelTitle').textContent = `${assess.code} — ${session.label}`;
  document.getElementById('assessPanelBody').innerHTML = `
    <p><b>${esc(session.label)}</b> — ${esc(session.focus)}</p>
    <p>${assessOpenLink(assess.file)}</p>
    <div class="assess-doc-content loading" id="assessDocPanel">Loading assessment…</div>`;
  document.getElementById('assessOverlay').classList.add('open');
  mountAssessDoc(assess.id, document.getElementById('assessDocPanel'), session.focus, l?.id);
  updateNav();
}
function closeAssessOverlay(){
  document.getElementById('assessOverlay').classList.remove('open');
  updateNav();
}

function isPresenting(){ return document.documentElement.classList.contains('presenting'); }
function setPresenting(on){
  document.documentElement.classList.toggle('presenting', on);
  updatePresentScale();
}
async function enterPresent(){
  setPresenting(true);
  try{
    const root = document.documentElement;
    if(!document.fullscreenElement){
      if(root.requestFullscreen) await root.requestFullscreen();
      else if(root.webkitRequestFullscreen) root.webkitRequestFullscreen();
    }
  }catch(_){}
  updatePresentScale();
}
function exitPresent(){
  setPresenting(false);
  const slide = document.getElementById('slide');
  if(slide) slide.style.transform = '';
  if(document.fullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
function togglePresent(){
  if(document.fullscreenElement || isPresenting()) exitPresent();
  else enterPresent();
}
function updatePresentScale(){
  const slide = document.getElementById('slide');
  const wrap = document.getElementById('stageWrap');
  if(!slide || !wrap) return;
  slide.style.transform = '';
  if(!isPresenting() && !document.fullscreenElement) return;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const scale = Math.min(w/1180, h/738);
  slide.style.transform = `scale(${scale})`;
}
function openNotes(){
  document.getElementById('tnotes').classList.add('open');
  document.getElementById('notesBtn').classList.add('notes-open');
}
function closeNotes(){
  document.getElementById('tnotes').classList.remove('open');
  document.getElementById('notesBtn').classList.remove('notes-open');
}

document.getElementById('prev').onclick = navPrev;
document.getElementById('next').onclick = navNext;
document.getElementById('mapBtn').onclick = renderMap;
document.getElementById('jump').onchange = e=> show(+e.target.value);
document.getElementById('notesBtn').onclick = ()=>{
  if(document.getElementById('tnotes').classList.contains('open')) closeNotes();
  else openNotes();
};
document.getElementById('notesClose').onclick = closeNotes;
document.getElementById('revealBtn').onclick = toggleReveal;
document.getElementById('presentBtn').onclick = togglePresent;
document.getElementById('assessBtn').onclick = toggleAssessTask;
document.getElementById('assessClose').onclick = closeAssessOverlay;
document.getElementById('assessOverlay').onclick = e=>{ if(e.target.id==='assessOverlay') closeAssessOverlay(); };
window.addEventListener('resize', updatePresentScale);
document.addEventListener('fullscreenchange', ()=>{
  if(!document.fullscreenElement && isPresenting()) setPresenting(false);
  updatePresentScale();
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    const s = document.getElementById('slide');
    if(s?.classList.contains('answer-open')){ s.classList.remove('answer-open'); document.getElementById('revealBtn').classList.remove('primary'); }
    closeAssessOverlay(); closeNotes(); exitPresent(); return;
  }
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='f'||e.key==='F'){ e.preventDefault(); togglePresent(); return; }
  if(e.key==='t'||e.key==='T'){ e.preventDefault(); document.getElementById('notesBtn').click(); return; }
  if(e.key==='r'||e.key==='R'){ e.preventDefault(); toggleReveal(); return; }
  if(e.key==='a'||e.key==='A'){
    const l = getLesson(lessonId);
    if(mode==='lesson' && isAssessmentLesson(l)){ e.preventDefault(); toggleAssessTask(); return; }
  }
  if(mode!=='lesson') return;
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); navNext(); return; }
  if(e.key==='ArrowLeft'){ e.preventDefault(); navPrev(); return; }
});

renderMap();
</script>
</body>
</html>
